<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Kanit:wght@500;600;700&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body>
    <div class="left-side">
        <div class="overlay">
            <img src="./images/ball.png" width="80px">
            TENNIS CLUB
        </div>
    </div>
    <div class="right-side">
        <div class="text">
            <span>This is not a real online service! You know you need something like this
            in your life to help you realize your deepest dreams.</span>
            <br>
            <span>Sign up <i>now</i> to get started</span>
            <p>You <i>know</i> you want to</p>
        </div>
        <div class="form-container">
            <h3>Let's do this!</h3>
        <form id="my-form" action="#">
            <div class="form-left-side">
            <div class="form-field">
                <label for="fname">FIRST NAME</label><br>
                <input type="text" name="fname" id="fname" required><br>
            </div>
            <div class="form-field">
                <label for="email">EMAIL</label><br>
                <input type="email" name="email" id="email" required><br>
            </div>
            <div class="form-field">
                <label for="password">PASSWORD</label><br>
                <input type="password" name="password" id="password" required><br>
            </div>
        </div>
        <div class="form-right-side">
            <div class="form-field">
                <label for="lname">LAST NAME</label><br>
                <input type="text" name="lname" id="lname" required><br>
            </div>
            <div class="form-field">
                <label for="pnumber">PHONE NUMBER</label><br>
                <input type="number" name="pnumber" id="pnumber" required><br>
            </div>
            <div class="form-field">
                <label for="confirm">CONFIRM PASSWORD</label><br>
                <input type="password" name="confirm" id="confirm" required><br>
            </div>
        </div>
        </form>
    </div>

    <div class="submit">
        <button type="submit" form="my-form">Create Account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
    </div>
    </div>
</body>
</html>
